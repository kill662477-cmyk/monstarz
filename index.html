<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>와토 모음</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top,#1e3a8a 0%,transparent 30%),
    radial-gradient(circle at bottom right,#0f172a 0%,transparent 35%),
    #020617;
  color:#fff;
  font-family:Malgun Gothic,Arial,sans-serif;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:18px;
}

.hero{
  position:relative;
  overflow:hidden;
  padding:26px 22px;
  border-radius:24px;
  background:linear-gradient(135deg,#111827,#1e293b 55%,#1d4ed8);
  border:1px solid rgba(255,255,255,.12);
  margin-bottom:16px;
  box-shadow:0 10px 40px rgba(0,0,0,.45);
}

.hero::before{
  content:"";
  position:absolute;
  top:-80px;
  right:-80px;
  width:220px;
  height:220px;
  border-radius:50%;
  background:rgba(255,255,255,.06);
}

.title{
  position:relative;
  font-size:34px;
  font-weight:900;
  text-align:center;
  letter-spacing:-1px;
}

.sub{
  position:relative;
  text-align:center;
  color:#cbd5e1;
  margin-top:10px;
  font-size:14px;
}

.tabs{
  display:grid;
  gap:10px;
  margin-bottom:14px;
}

.board-tabs{
  grid-template-columns:repeat(3,1fr);
}

.status-tabs{
  grid-template-columns:repeat(3,1fr);
}

.category-tabs{
  grid-template-columns:repeat(7,1fr);
}

.tab{
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px 12px;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  background:rgba(15,23,42,.92);
  color:#cbd5e1;
  transition:.18s ease;
  backdrop-filter:blur(8px);
}

.tab:hover{
  transform:translateY(-2px);
  border-color:rgba(96,165,250,.55);
  color:#fff;
}

.tab.on{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  border-color:rgba(255,255,255,.18);
  box-shadow:0 8px 24px rgba(37,99,235,.35);
}

.toolbar{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:14px;
}

.checked{
  background:rgba(15,23,42,.82);
  border:1px solid rgba(255,255,255,.08);
  color:#94a3b8;
  padding:11px 18px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.list{
  display:grid;
  gap:14px;
}

.card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,rgba(15,23,42,.96),rgba(30,41,59,.96));
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  box-shadow:0 12px 34px rgba(0,0,0,.28);
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(37,99,235,.10),transparent 40%);
  pointer-events:none;
}

.card-main{
  min-width:0;
  flex:1;
}

.badge-row{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-bottom:10px;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  letter-spacing:.2px;
}

.badge.board{
  background:rgba(37,99,235,.18);
  color:#93c5fd;
  border:1px solid rgba(96,165,250,.25);
}

.badge.category{
  background:rgba(34,197,94,.15);
  color:#86efac;
  border:1px solid rgba(74,222,128,.2);
}

.badge.status-live{
  background:rgba(34,197,94,.18);
  color:#86efac;
  border:1px solid rgba(74,222,128,.24);
}

.badge.status-closed{
  background:rgba(251,191,36,.16);
  color:#fde68a;
  border:1px solid rgba(251,191,36,.22);
}

.badge.status-result{
  background:rgba(239,68,68,.18);
  color:#fca5a5;
  border:1px solid rgba(248,113,113,.22);
}

.card-title{
  font-size:18px;
  line-height:1.55;
  font-weight:900;
  color:#fff;
  word-break:break-word;
}

.meta{
  margin-top:10px;
  color:#94a3b8;
  font-size:12px;
  line-height:1.6;
  font-weight:700;
}

.actions{
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}

.open{
  border:0;
  border-radius:14px;
  padding:14px 18px;
  min-width:140px;
  text-align:center;
  font-size:13px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  box-shadow:0 10px 20px rgba(37,99,235,.28);
  transition:.18s ease;
}

.open:hover{
  transform:translateY(-2px);
  filter:brightness(1.05);
}

.empty{
  text-align:center;
  padding:42px 18px;
  border-radius:22px;
  background:rgba(15,23,42,.92);
  border:1px solid rgba(255,255,255,.08);
  color:#94a3b8;
  font-size:14px;
  font-weight:700;
}

/* =========================
   MOBILE ONLY DESIGN ZONE
========================= */

@media(max-width:640px){

  body{
    background:
      radial-gradient(circle at top,#1e3a8a 0%,transparent 34%),
      #020617;
  }

  .wrap{
    max-width:none;
    width:100%;
    padding:10px;
  }

  .hero{
    padding:18px 14px;
    border-radius:18px;
    margin-bottom:12px;
  }

  .hero::before{
    width:160px;
    height:160px;
    top:-60px;
    right:-60px;
  }

  .title{
    font-size:26px;
    line-height:1.2;
  }

  .sub{
    font-size:12px;
    margin-top:7px;
  }

  .tabs{
    gap:7px;
    margin-bottom:10px;
  }

  .board-tabs{
    grid-template-columns:repeat(3,1fr);
  }

  .status-tabs{
    grid-template-columns:repeat(3,1fr);
  }

  /* 모바일 종목탭 */
  .category-tabs{
    grid-template-columns:repeat(7,1fr);
    gap:4px;
  }

  .tab{
    padding:11px 6px;
    min-height:42px;
    border-radius:12px;
    font-size:12px;
    line-height:1.2;
  }

  .category-tabs .tab{
    padding:7px 2px;
    min-height:34px;
    border-radius:10px;
    font-size:9px;
    line-height:1.05;
    letter-spacing:-0.3px;
  }

  .toolbar{
    margin-bottom:10px;
  }

  .checked{
    width:100%;
    padding:9px 10px;
    font-size:11px;
    text-align:center;
  }

  .list{
    gap:10px;
  }

  .card{
    display:block;
    padding:14px;
    border-radius:17px;
  }

  .badge-row{
    gap:5px;
    margin-bottom:8px;
  }

  .badge{
    padding:5px 8px;
    font-size:10px;
  }

  .card-title{
    font-size:15px;
    line-height:1.45;
  }

  .meta{
    margin-top:7px;
    font-size:11px;
  }

  .actions{
    margin-top:12px;
    width:100%;
  }

  .open{
    width:100%;
    min-width:0;
    padding:12px 10px;
    border-radius:12px;
    font-size:12px;
  }

  .empty{
    padding:30px 12px;
    border-radius:17px;
    font-size:13px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <div class="hero">
    <div class="title">와토 모음</div>
    <div class="sub">미또게 · 스대게 · 숲게 와토 자동 리스트</div>
  </div>

  <div class="tabs board-tabs">
    <button id="board-mitto" class="tab on" onclick="setBoard('mitto')">미또게</button>
    <button id="board-monstarz" class="tab" onclick="setBoard('monstarz')">스대게</button>
    <button id="board-soop" class="tab" onclick="setBoard('soop')">숲게</button>
  </div>

  <div class="tabs status-tabs">
    <button id="tab-live" class="tab on" onclick="setTab('live')">진행중</button>
    <button id="tab-closed" class="tab" onclick="setTab('closed')">마감</button>
    <button id="tab-result" class="tab" onclick="setTab('result')">결과</button>
  </div>

  <div id="categoryArea" class="tabs category-tabs">
    <button id="category-all" class="tab on" onclick="setCategory('all')">전체</button>
    <button id="category-basketball" class="tab" onclick="setCategory('basketball')">농구 🏀</button>
    <button id="category-baseball" class="tab" onclick="setCategory('baseball')">야구 ⚾</button>
    <button id="category-football" class="tab" onclick="setCategory('football')">축구 ⚽</button>
    <button id="category-lol" class="tab" onclick="setCategory('lol')">LOL 🏆</button>
    <button id="category-star" class="tab" onclick="setCategory('star')">스타 🖱</button>
    <button id="category-etc" class="tab" onclick="setCategory('etc')">기타 ✨</button>
  </div>

  <div class="toolbar">
    <div id="checkedAt" class="checked">업데이트 확인 중...</div>
  </div>

  <div id="list" class="list">
    <div class="empty">불러오는 중...</div>
  </div>

</div>

<script>
let currentBoard = "mitto";
let currentTab = "live";
let currentCategory = "all";

const boardNames = {
  mitto: "미또게",
  monstarz: "스대게",
  soop: "숲게"
};

const tabNames = {
  live: "진행중",
  closed: "마감",
  result: "결과"
};

function setBoard(board){

  currentBoard = board;

  document
    .querySelectorAll("[id^='board-']")
    .forEach(v => v.classList.remove("on"));

  document
    .getElementById("board-" + board)
    .classList.add("on");

  const categoryArea = document.getElementById("categoryArea");

  if(board === "mitto"){
    categoryArea.style.display = "grid";
  }else{
    categoryArea.style.display = "none";
  }

  loadWatos();
}

function setTab(tab){

  currentTab = tab;

  document
    .querySelectorAll("[id^='tab-']")
    .forEach(v => v.classList.remove("on"));

  document
    .getElementById("tab-" + tab)
    .classList.add("on");

  loadWatos();
}

function setCategory(category){

  currentCategory = category;

  document
    .querySelectorAll("[id^='category-']")
    .forEach(v => v.classList.remove("on"));

  document
    .getElementById("category-" + category)
    .classList.add("on");

  loadWatos();
}

function getStatusClass(tab){
  if(tab === "live") return "status-live";
  if(tab === "closed") return "status-closed";
  return "status-result";
}

function categoryName(category){

  const map = {
    basketball:"농구",
    baseball:"야구",
    football:"축구",
    lol:"LOL",
    star:"스타",
    etc:"기타"
  };

  return map[category] || "기타";
}

function matchesCategory(item){

  if(currentBoard !== "mitto"){
    return true;
  }

  if(currentCategory === "all"){
    return true;
  }

  return item.category === currentCategory;
}

async function loadWatos(){

  const list = document.getElementById("list");
  const checkedAt = document.getElementById("checkedAt");

  list.innerHTML = '<div class="empty">불러오는 중...</div>';

  try{

    const r = await fetch("./data/watos.json?t=" + Date.now(), {
      cache:"no-store"
    });

    if(!r.ok){
      throw new Error("watos.json fetch failed");
    }

    const data = await r.json();

    let items =
      data.boards &&
      data.boards[currentBoard] &&
      data.boards[currentBoard][currentTab]
        ? data.boards[currentBoard][currentTab]
        : [];

    items = items.filter(matchesCategory);

    if(currentTab === "live"){
      items = [...items].sort((a, b) => {
        return getRemainMinutes(a.statusText) - getRemainMinutes(b.statusText);
      });
    }

    checkedAt.textContent = data.checkedAt
      ? `마지막 업데이트 : ${formatDate(data.checkedAt)}`
      : "업데이트 정보 없음";

    if(!items.length){

      list.innerHTML = `
        <div class="empty">
          ${boardNames[currentBoard]} ${tabNames[currentTab]} 목록이 없습니다.
        </div>
      `;

      return;
    }

    list.innerHTML = items.map(item => {

      const betUrl = item.watoUrl || item.articleUrl || "#";

      return `
        <div class="card">

          <div class="card-main">

            <div class="badge-row">

              <div class="badge board">
                ${escapeHtml(item.boardName || boardNames[currentBoard])}
              </div>

              ${item.category ? `
                <div class="badge category">
                  ${escapeHtml(categoryName(item.category))}
                </div>
              ` : ""}

              <div class="badge ${getStatusClass(currentTab)}">
                ${escapeHtml(item.statusText || tabNames[currentTab])}
              </div>

            </div>

            <div class="card-title">
              ${escapeHtml(item.title)}
            </div>

            <div class="meta">
              게시글 번호 #${escapeHtml(item.id)}
            </div>

          </div>

          <div class="actions">
            <a
              class="open"
              href="${escapeAttr(betUrl)}"
              target="_blank"
              rel="noopener noreferrer"
            >
              배팅하러가기
            </a>
          </div>

        </div>
      `;
    }).join("");

  }catch(e){

    checkedAt.textContent = "업데이트 정보 불러오기 실패";

    list.innerHTML = `
      <div class="empty">
        watos.json 불러오기 실패
      </div>
    `;
  }
}

function getRemainMinutes(text){

  if(!text) return 999999;

  const t = String(text);
  let total = 0;

  const day = t.match(/(\d+)\s*일/);
  const hour = t.match(/(\d+)\s*시간/);
  const min = t.match(/(\d+)\s*분/);

  if(day) total += parseInt(day[1], 10) * 1440;
  if(hour) total += parseInt(hour[1], 10) * 60;
  if(min) total += parseInt(min[1], 10);

  return total || 999999;
}

function escapeHtml(str){

  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function escapeAttr(str){

  return escapeHtml(str)
    .replaceAll("`","&#096;");
}

function formatDate(iso){

  try{

    const d = new Date(iso);

    return d.toLocaleString("ko-KR", {
      timeZone:"Asia/Seoul",
      month:"2-digit",
      day:"2-digit",
      hour:"2-digit",
      minute:"2-digit"
    });

  }catch(e){

    return iso;
  }
}

loadWatos();
</script>

</body>
</html>
