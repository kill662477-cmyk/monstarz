  let liveStatusMap={}, lastCheckedAt="", inoutMode="ALL", selectedBoja=BOJA_CATEGORIES[0]?.name||"";
  const $=id=>document.getElementById(id);
  const esc=v=>String(v??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const safe=url=>{try{const u=new URL(String(url||""),location.href);return /^https?:$/.test(u.protocol)?u.href:"#"}catch{return "#"}};
  const uid=m=>m.userId||((m.stream||"").match(/station\/([^/?#]+)/)||[])[1]||"";
  const liveMembers=()=>MEMBERS.map(m=>({...m,status:liveStatusMap[uid(m)]===true?"live":"offline"}));
  function card(m){const isLive=m.status==="live";return `<article class="member"><div class="member-top"><span class="badge ${isLive?'live':''}">${isLive?'LIVE':'OFFLINE'}</span></div><div class="member-body"><img class="avatar ${isLive?'live':''}" src="${safe(m.profileImage)}" alt="${esc(m.name)}"><div class="name">${esc(m.name)}</div><div class="meta">${esc(m.role)} · ${esc(m.race)} · ${esc(String(m.tier))}</div><div class="actions"><a href="${safe(m.live)}" target="_blank" rel="noopener">방송 보기</a><a href="${safe(m.stream)}" target="_blank" rel="noopener">방송국</a></div></div></article>`}
  function renderMembers(){const all=liveMembers(), live=all.filter(m=>m.status==='live');$('statAll').textContent=all.length;$('statLive').textContent=live.length;$('liveList').innerHTML=live.length?live.map(card).join(''):'<div class="empty" style="grid-column:1/-1">현재 방송 중인 멤버가 없습니다.</div>';$('profileList').innerHTML=all.map(card).join('')}
  async function fetchLive(){try{const r=await fetch(LIVE_STATUS_URL,{cache:'no-store'});const d=await r.json();if(d?.statuses){liveStatusMap=d.statuses;lastCheckedAt=d.checkedAt||''}}catch(e){console.warn(e)}renderMembers();$('liveChecked').textContent=lastCheckedAt?new Date(lastCheckedAt).toLocaleString('ko-KR'):'갱신 정보 없음'}
  function normalizeNotice(x){return {stationName:String(x.stationName||x.writer||'공지'),userId:String(x.userId||''),title:String(x.title||x.subject||''),content:String(x.content||x.body||x.summary||''),time:String(x.time||''),link:String(x.link||'')}}
  async function fetchNotices(){try{const r=await fetch(NOTICE_JSON_URL+'?t='+Date.now(),{cache:'no-store'});const d=await r.json();const items=(Array.isArray(d?.items)?d.items:[]).map(normalizeNotice).slice(0,40);$('noticeCount').textContent=items.length+'개';$('noticeList').innerHTML=items.length?items.map(n=>{const m=MEMBERS.find(v=>v.userId===n.userId);return `<a class="notice" href="${safe(n.link)}" target="_blank" rel="noopener"><img src="${safe(m?.profileImage||TEAM.logo)}" alt=""><div><div class="notice-title">${esc(n.stationName)} · ${esc(n.title)}</div>${n.content?`<div class="notice-body">${esc(n.content)}</div>`:''}<div class="notice-time">${esc(n.time||'날짜 없음')}</div></div></a>`}).join(''):'<div class="empty">공지 데이터가 없습니다.</div>'}catch(e){$('noticeList').innerHTML='<div class="empty">공지 데이터를 불러오지 못했습니다.</div>'}}
  function renderInout(){const q=$('inoutSearch').value.trim();const rows=INOUT_HISTORY.map(r=>({...r,events:r.events.filter(e=>(inoutMode==='ALL'||e.status===inoutMode)&&(!q||e.name.includes(q)))})).filter(r=>r.events.length).reverse();$('inoutCount').textContent=rows.reduce((s,r)=>s+r.events.length,0)+'건';$('inoutList').innerHTML=rows.length?rows.map(r=>`<article class="inout"><div class="date">${esc(r.date)}</div><div class="events">${r.events.map(e=>`<span class="event">${esc(e.name)} <small>${esc(e.race)}</small><b class="status ${e.status==='IN'?'in':'out'}">${esc(e.status)}</b></span>`).join('')}</div></article>`).join(''):'<div class="empty">검색 결과가 없습니다.</div>'}
  function youtubeId(url){return ((String(url).match(/youtu\.be\/([^?&#/]+)/)||String(url).match(/[?&]v=([^?&#/]+)/)||[])[1]||'')}
  function renderBoja(){const cat=BOJA_CATEGORIES.find(c=>c.name===selectedBoja)||BOJA_CATEGORIES[0];$('bojaCats').innerHTML=BOJA_CATEGORIES.map(c=>`<button data-cat="${esc(c.name)}" class="${c.name===cat.name?'active':''}">${esc(c.name)}</button>`).join('');$('bojaCount').textContent=(cat?.items?.length||0)+'개';$('bojaList').innerHTML=(cat?.items||[]).map(v=>{const id=youtubeId(v.url);const thumb=id?'https://img.youtube.com/vi/'+id+'/mqdefault.jpg':'';return `<article class="video-card">${thumb?`<img class="thumb" src="${thumb}" alt="">`:'<div class="thumb"></div>'}<div><a href="${safe(v.url)}" target="_blank" rel="noopener">${esc(v.title)}</a><div class="video-note">${esc(v.note||'영상')}</div></div></article>`}).join('')||'<div class="empty">등록된 영상이 없습니다.</div>';document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{selectedBoja=b.dataset.cat;renderBoja()})}
  function normVideo(x,source){const id=x.videoId||youtubeId(x.url||x.link||'');return {id,title:String(x.title||''),url:String(x.url||x.link||(id?'https://youtu.be/'+id:'')),thumb:String(x.thumbnail||x.thumbnailUrl||(id?'https://img.youtube.com/vi/'+id+'/mqdefault.jpg':'')),source}}
  async function fetchFantube(){try{const rs=await Promise.allSettled([fetch(YOUTUBE_JSON_URL).then(r=>r.json()),fetch(KAMRINI_JSON_URL).then(r=>r.json())]);const a=rs[0].status==='fulfilled'?(rs[0].value.items||[]):[],b=rs[1].status==='fulfilled'?(rs[1].value.items||[]):[];const items=[...a.map(x=>normVideo(x,x.name||x.channelTitle||'팬튜브')),...b.map(x=>normVideo(x,'캄린이'))].filter(v=>v.id&&v.url);$('fantubeCount').textContent=items.length+'개';$('fantubeList').innerHTML=items.length?items.map(v=>`<article class="video-card"><img class="thumb" src="${safe(v.thumb)}" alt=""><div><a href="${safe(v.url)}" target="_blank" rel="noopener">${esc(v.title)}</a><div class="video-note">${esc(v.source)}</div></div></article>`).join(''):'<div class="empty">팬튜브 영상이 없습니다.</div>'}catch(e){$('fantubeList').innerHTML='<div class="empty">팬튜브 데이터를 불러오지 못했습니다.</div>'}}
  function openPage(name){document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===name));document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===name));$('pageName').textContent=({dashboard:'현황판',profile:'프로필',tier:'티어표',notice:'공지',inout:'IN&OUT',boja:'보자충',fantube:'팬튜브'})[name]||name;localStorage.setItem('monstarz-mobile-tab',name);scrollTo(0,0)}
  document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>openPage(b.dataset.page));$('inoutSearch').oninput=renderInout;$('inoutFilter').onclick=e=>{const b=e.target.closest('button');if(!b)return;inoutMode=b.dataset.value;document.querySelectorAll('#inoutFilter button').forEach(x=>x.classList.toggle('active',x===b));renderInout()};$('refreshBtn').onclick=()=>{fetchLive();fetchNotices();fetchFantube()};
  $('statRecent').textContent=INOUT_HISTORY.at(-1)?.date||'-';renderMembers();renderInout();renderBoja();fetchLive();fetchNotices();fetchFantube();setInterval(fetchLive,60000);openPage(localStorage.getItem('monstarz-mobile-tab')||'dashboard');
</script>
