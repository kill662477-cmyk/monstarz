<body>

<div class="app">
  <header class="top"><div class="head-row"><div class="brand"><img class="logo" src="https://stimg.sooplive.com/NORMAL_BBS/0/16216050/30546a167f55e2168.gif" alt="캄몬스타즈"><div><div class="title">MONSTARZ</div><div id="pageName" class="subtitle">현황판</div></div></div><button id="refreshBtn" class="refresh" type="button">새로고침</button></div></header>
  <main class="content">
    <section id="dashboard" class="page active">
      <div class="hero"><div class="hero-top"><div><div class="hero-title">캄몬스타즈 현황</div><div class="hero-note">전체 멤버 · 실시간 방송 상태</div></div><span id="liveChecked" class="count">확인 중</span></div><div class="stats"><div class="stat"><span>전체</span><b id="statAll">0</b></div><div class="stat"><span>LIVE</span><b id="statLive">0</b></div><div class="stat"><span>최근 IN</span><b id="statRecent">-</b></div></div></div>
      <div class="section"><div class="section-head"><h2>멤버 현황</h2><span class="count">방송 중 카드 점등</span></div><div id="dashboardList" class="dashboard-grid"></div></div>
    </section>

  const safeProfile=url=>{const v=String(url||"");if(/^data:image\/(?:png|jpe?g|webp|gif);base64,/i.test(v))return v;return safe(v)};
  const safeKey=v=>String(v||"").replace(/[.#$/[\]]/g,"_");
  const uid=m=>m.userId||((m.stream||"").match(/station\/([^/?#]+)/)||[])[1]||"";
  const normalizeList=v=>Array.isArray(v)?v:(v&&typeof v==="object"?Object.keys(v).sort((a,b)=>Number(a)-Number(b)).map(k=>v[k]).filter(Boolean):[]);
  const isLiveValue=v=>v===true||Boolean(v&&(v.live===true||v.status==="live"||v.broadNo||v.broad_no||v.broadcastUrl));
  const raceCode=v=>{const x=String(v||"").toUpperCase();if(x.startsWith("P"))return"P";if(x.startsWith("T"))return"T";if(x.startsWith("Z"))return"Z";return x||"-"};
  const raceName=v=>({P:"Protoss",T:"Terran",Z:"Zerg"})[raceCode(v)]||String(v||"-");
  const raceClass=v=>"race-"+raceCode(v).toLowerCase();
  const memberTier=m=>m.name==="낭니"?"유스":(typeof m.tier==="number"?m.tier+"티어":String(m.tier||m.role||"-"));
  function liveMembers(){return MEMBERS.map(m=>({...m,status:isLiveValue(liveStatusMap[uid(m)])?"live":"offline"}))}
  function memberCard(m){const on=m.status==="live";return `<article class="member ${on?"live-on":""}"><div class="member-cover"><span class="live-pill">${on?"LIVE":"OFFLINE"}</span></div><div class="member-body"><img class="avatar" src="${safe(m.profileImage)}" alt="${esc(m.name)}"><div class="member-name-row"><div class="name">${esc(m.name)}</div><span class="race ${raceClass(m.race)}">${esc(raceCode(m.race))}</span></div><div class="meta">${esc(m.role)} · ${esc(memberTier(m))}</div><div class="actions"><a href="${safe(m.live)}" target="_blank" rel="noopener">방송 보기</a><a href="${safe(m.stream)}" target="_blank" rel="noopener">방송국</a></div></div></article>`}
  function renderDashboard(){const all=liveMembers();$("statAll").textContent=all.length;$("statLive").textContent=all.filter(m=>m.status==="live").length;$("dashboardList").innerHTML=all.map(memberCard).join("")}
  async function fetchLive(){try{const r=await fetch(LIVE_STATUS_URL,{cache:"no-store"});const d=await r.json();if(d?.statuses){liveStatusMap=d.statuses;lastCheckedAt=d.checkedAt||""}}catch(e){console.warn(e)}renderDashboard();$("liveChecked").textContent=lastCheckedAt?new Date(lastCheckedAt).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})+" 갱신":"갱신 정보 없음"}
  function profileConfig(name){return PROFILE_IMAGE_MAP[name]||{}}

  function has(v){return v!==undefined&&v!==null&&String(v).trim()&&String(v).trim()!=="-"}
  function renderProfileOptions(filter=""){const q=filter.trim();const list=PROFILE_MEMBERS.filter(p=>!q||p.name.includes(q));if(!list.some(p=>p.name===selectedProfileName))selectedProfileName=(list[0]||PROFILE_MEMBERS[0]||{}).name||"";$("profileCount").textContent=PROFILE_MEMBERS.length+"명";$("profileSelect").innerHTML=list.map(p=>`<option value="${esc(p.name)}" ${p.name===selectedProfileName?"selected":""}>${esc(p.name)} · ${esc(p.role||"")}</option>`).join("");renderProfileDetail()}
  function renderProfileDetail(){const p=PROFILE_MEMBERS.find(x=>x.name===selectedProfileName)||PROFILE_MEMBERS[0];if(!p){$("profileDetail").innerHTML='<div class="empty">프로필 데이터가 없습니다.</div>';return}const facts=[["생년월일",p.birth],["혈액형",p.blood],["MBTI",p.mbti],["신장",p.height],["방송 데뷔",p.debut]].filter(x=>has(x[1]));$("profileDetail").innerHTML=`<article class="profile-card"><div class="profile-photo-wrap"><img class="profile-photo" src="${safeProfile(profileImage(p.name))}" style="object-position:${esc(profilePosition(p.name))}" onerror="this.onerror=null;this.src='${safeProfile(profileFallbackImage(p.name))}'" alt="${esc(p.name)}"><span class="profile-role">${esc(p.role||"PROFILE")}</span></div><div class="profile-info"><div class="profile-name">${esc(p.name)}</div><div class="profile-facts">${facts.length?facts.map(x=>`<div class="profile-fact"><span>${esc(x[0])}</span><b>${esc(x[1])}</b></div>`).join(""):'<div class="empty">등록된 상세 정보가 없습니다.</div>'}</div>${Array.isArray(p.awards)&&p.awards.length?`<div class="awards"><h3>수상경력</h3><ul>${p.awards.map(a=>`<li>${esc(a)}</li>`).join("")}</ul></div>`:""}</div></article>`}
  function cleanNoticeTitle(v){return String(v||"").replace(/^\s*notice\s*/i,"").replace(/\s+/g," ").trim()}
  function cleanNoticeContent(v){return String(v||"").replace(/^\s*notice\s*/i,"").replace(/\s+\d[\d,]*\s+\d[\d,]*\s+\d[\d,]*\s*$/,"").replace(/\s+/g," ").trim()}
  function cleanNoticeTime(v){const t=String(v||"").trim();if(!t||/^\d+(?:\s+\d+){1,}$/.test(t))return"";return t}
  function normalizeNotice(x){return{stationName:String(x.stationName||x.writer||"공지").trim(),userId:String(x.userId||""),title:cleanNoticeTitle(x.title||x.subject||x.heading||""),content:cleanNoticeContent(x.content||x.body||x.summary||""),time:cleanNoticeTime(x.time||""),link:String(x.link||"")}}
  async function fetchNotices(){try{const r=await fetch(NOTICE_JSON_URL+"?t="+Date.now(),{cache:"no-store"});const d=await r.json();const items=(Array.isArray(d?.items)?d.items:[]).map(normalizeNotice).slice(0,40);$("noticeCount").textContent=items.length+"개";$("noticeList").innerHTML=items.length?items.map(n=>{const m=MEMBERS.find(v=>v.userId===n.userId);return `<a class="notice" href="${safe(n.link)}" target="_blank" rel="noopener"><img src="${safe(m?.profileImage||TEAM.logo)}" alt=""><div>${n.title?`<div class="notice-title">${esc(n.stationName)} · ${esc(n.title)}</div>`:`<div class="notice-title">${esc(n.stationName)}</div>`}${n.content?`<div class="notice-body">${esc(n.content)}</div>`:""}${n.time?`<div class="notice-time">${esc(n.time)}</div>`:""}</div></a>`}).join(""):'<div class="empty">공지 데이터가 없습니다.</div>'}catch(e){$("noticeList").innerHTML='<div class="empty">공지 데이터를 불러오지 못했습니다.</div>'}}
  function renderInout(){const q=$("inoutSearch").value.trim();const rows=INOUT_HISTORY.map(r=>({...r,events:r.events.filter(e=>(inoutMode==="ALL"||e.status===inoutMode)&&(!q||e.name.includes(q)))})).filter(r=>r.events.length).reverse();$("inoutCount").textContent=rows.reduce((s,r)=>s+r.events.length,0)+"건";$("inoutList").innerHTML=rows.length?rows.map(r=>`<article class="inout"><div class="date">${esc(r.date)}</div><div class="events">${r.events.map(e=>`<span class="event">${esc(e.name)} <small>${esc(e.race)}</small><b class="status ${e.status==="IN"?"in":"out"}">${esc(e.status)}</b></span>`).join("")}</div></article>`).join(""):'<div class="empty">검색 결과가 없습니다.</div>'}
  function youtubeId(url){return((String(url).match(/youtu\.be\/([^?&#/]+)/)||String(url).match(/[?&]v=([^?&#/]+)/)||[])[1]||"")}
  function renderBoja(){const cat=BOJA_CATEGORIES.find(c=>c.name===selectedBoja)||BOJA_CATEGORIES[0];$("bojaCats").innerHTML=BOJA_CATEGORIES.map(c=>`<button data-cat="${esc(c.name)}" class="${c.name===cat.name?"active":""}">${esc(c.name)}</button>`).join("");$("bojaCount").textContent=(cat?.items?.length||0)+"개";$("bojaList").innerHTML=(cat?.items||[]).map(v=>{const id=youtubeId(v.url),thumb=id?"https://img.youtube.com/vi/"+id+"/mqdefault.jpg":"";return `<a class="video-card" href="${safe(v.url)}" target="_blank" rel="noopener">${thumb?`<img class="thumb" src="${thumb}" alt="">`:'<div class="thumb"></div>'}<div><div class="video-card-title">${esc(v.title)}</div><div class="video-note">${esc(v.note||"영상")}</div></div></a>`}).join("")||'<div class="empty">등록된 영상이 없습니다.</div>';document.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{selectedBoja=b.dataset.cat;renderBoja()})}
  function normVideo(x,source){const id=x.videoId||youtubeId(x.url||x.link||"");return{id,title:String(x.title||""),url:String(x.url||x.link||(id?"https://youtu.be/"+id:"")),thumb:String(x.thumbnail||x.thumbnailUrl||(id?"https://img.youtube.com/vi/"+id+"/mqdefault.jpg":"")),source}}
  async function fetchFantube(){try{const rs=await Promise.allSettled([fetch(YOUTUBE_JSON_URL).then(r=>r.json()),fetch(KAMRINI_JSON_URL).then(r=>r.json())]);const a=rs[0].status==="fulfilled"?(rs[0].value.items||[]):[],b=rs[1].status==="fulfilled"?(rs[1].value.items||[]):[];const items=[...a.map(x=>normVideo(x,x.name||x.channelTitle||"팬튜브")),...b.map(x=>normVideo(x,"캄린이"))].filter(v=>v.id&&v.url);$("fantubeCount").textContent=items.length+"개";$("fantubeList").innerHTML=items.length?items.map(v=>`<a class="video-card" href="${safe(v.url)}" target="_blank" rel="noopener"><img class="thumb" src="${safe(v.thumb)}" alt=""><div><div class="video-card-title">${esc(v.title)}</div><div class="video-note">${esc(v.source)}</div></div></a>`).join(""):'<div class="empty">팬튜브 영상이 없습니다.</div>'}catch(e){$("fantubeList").innerHTML='<div class="empty">팬튜브 데이터를 불러오지 못했습니다.</div>'}}
  const TIER_ORDER=["G","K","J","S","1","2","3","4","5","6","7","8","U","O","0","B","N"];
  const TIER_NAMES={G:"God",K:"King",J:"Jack",S:"Spade",U:"유스",O:"조커티어",B:"베이비티어",N:"티어없음"};
  function tierCode(p){const raw=String(p.tierCode??p.tier??p.tierId??"N").replace(/^tier-/,"").trim().toUpperCase();if(raw==="GOD")return"G";if(raw==="KING")return"K";if(raw==="JACK")return"J";if(raw==="SPADE")return"S";if(raw==="YOUTH"||raw==="유스"||raw==="9")return"U";return raw||"N"}
  function tierLabel(p){const c=tierCode(p);return TIER_NAMES[c]||(c==="N"?"티어없음":c+"티어")}
  function tierLiveInfo(p){return tierLiveMap[safeKey(p.userId)]??tierLiveMap[p.userId]??p.live??false}
  function tierIsLive(p){return isLiveValue(tierLiveInfo(p))}
  function tierImage(p){return p.image||p.sourceImage||p.profileImage||p.broad?.profileImg||TEAM.logo}
  function tierThumb(p){const info=tierLiveInfo(p)||{};return info.thumbnailUrl||info.thumbnail||info.thumb||info.image||info.broadImg||info.broad_image||info.preview||p.thumbnailUrl||p.thumbnail||p.thumb||p.broad?.thumbnail||tierImage(p)}
  function filterTierPlayers(){const q=$("tierSearch").value.trim().toLowerCase(),race=$("tierRace").value;return tierPlayers.filter(p=>(!q||String(p.name||"").toLowerCase().includes(q)||String(p.userId||"").toLowerCase().includes(q))&&(race==="ALL"||raceCode(p.race)===race)&&(tierFilter==="ALL"||tierCode(p)===tierFilter)&&(tierLiveMode!=="LIVE"||tierIsLive(p)))}
  function renderTier(){const rows=filterTierPlayers();$("tierCount").textContent=rows.length+"명";const groups={};rows.forEach(p=>{const c=tierCode(p);(groups[c]||(groups[c]=[])).push(p)});const keys=[...TIER_ORDER,...Object.keys(groups).filter(k=>!TIER_ORDER.includes(k))].filter(k=>groups[k]?.length);$("tierList").innerHTML=keys.length?keys.map(k=>`<section class="tier-group"><div class="tier-head"><h3>${esc(TIER_NAMES[k]||(k==="N"?"티어없음":k+"티어"))}</h3><span>${groups[k].length}명</span></div><div class="tier-grid">${groups[k].map(p=>{const live=tierIsLive(p),fallback=safe(tierImage(p));return `<article class="tier-player ${raceClass(p.race)} ${live?"live-on":""}"><div class="tier-thumb-wrap"><img class="tier-thumb" src="${safe(tierThumb(p))}" onerror="this.onerror=null;this.src='${fallback}'" alt=""><div class="tier-thumb-shade"></div><span class="tier-live-pill">${live?"LIVE":"OFFLINE"}</span></div><div class="tier-player-content"><div class="tier-player-top"><div class="tier-player-main"><div class="tier-player-name">${esc(p.name||p.userId)}</div><div class="tier-player-sub">${esc(tierLabel(p))}</div></div><span class="tier-race ${raceClass(p.race)}">${esc(raceCode(p.race))}</span></div><div class="tier-player-actions"><button type="button" data-record-user="${esc(p.userId)}" data-record-race="${esc(raceCode(p.race))}" data-record-name="${esc(p.name||p.userId)}" data-record-image="${fallback}">전적</button>${live?`<a href="${safe(p.broadcastUrl||("https://play.sooplive.com/"+p.userId))}" target="_blank" rel="noopener">방송</a>`:""}</div></div></article>`}).join("")}</div></section>`).join(""):'<div class="empty">조건에 맞는 선수가 없습니다.</div>';document.querySelectorAll("[data-record-user]").forEach(b=>b.onclick=()=>openRecords(b.dataset.recordUser,b.dataset.recordRace,b.dataset.recordName,b.dataset.recordImage))}
  async function fetchTier(){try{const [playersRes,liveRes,metaRes]=await Promise.all([fetch(FIREBASE_ROOT+"/players.json",{cache:"no-store"}),fetch(FIREBASE_ROOT+"/liveStatus.json",{cache:"no-store"}),fetch(FIREBASE_ROOT+"/meta.json",{cache:"no-store"})]);tierPlayers=normalizeList(await playersRes.json());tierLiveMap=(await liveRes.json())||{};const meta=await metaRes.json();$("tierStatus").textContent="모바일 전용 티어표 · "+(meta?.updatedAt?new Date(meta.updatedAt).toLocaleString("ko-KR")+" 갱신":"Firebase 데이터 연결");renderTier()}catch(e){console.warn(e);$("tierStatus").textContent="티어 데이터를 불러오지 못했습니다."; $("tierList").innerHTML='<div class="empty">Firebase 연결 상태를 확인해주세요.</div>'}}
  function recordDate(row){return String(row.date||row.standardDate||row.playedAt||row.createdAt||"-").slice(0,10)}
  function rowId(row,kind){return String(kind==="winner"?(row.winnerSoopUserId||row.winnerUserId||row.winnerId||row.winner||""):(row.loseSoopUserId||row.loserSoopUserId||row.loseUserId||row.loserUserId||row.loserId||row.loser||""))}
  function rowName(row,kind){return String(kind==="winner"?(row.winnerNickname||row.winnerName||row.winName||row.winner||""):(row.loserNickname||row.loseNickname||row.loserName||row.loseName||row.loser||""))}
  function rowWin(row,userId){const wid=rowId(row,"winner"),lid=rowId(row,"loser");return wid===userId||(!lid&&String(row.result||"").toUpperCase()==="WIN")}
  function filterRecordRows(){const days=$("recordPeriod").value;if(days==="ALL")return recordState.rows;const limit=Date.now()-Number(days)*86400000;return recordState.rows.filter(row=>{const t=Date.parse(recordDate(row));return Number.isFinite(t)&&t>=limit})}
  function renderRecordModal(){const rows=filterRecordRows(),wins=rows.filter(r=>rowWin(r,recordState.userId)).length,losses=rows.length-wins,rate=rows.length?Math.round(wins*100/rows.length):0;$("recordSummary").innerHTML=`<div class="record-summary-card"><span>전체</span><b>${rows.length}</b></div><div class="record-summary-card"><span>승 / 패</span><b>${wins} / ${losses}</b></div><div class="record-summary-card"><span>승률</span><b>${rate}%</b></div>`;const opponents={};rows.forEach(row=>{const win=rowWin(row,recordState.userId),opp=win?rowName(row,"loser"):rowName(row,"winner"),key=opp||"상대 정보 없음";opponents[key]||(opponents[key]={name:key,w:0,l:0});win?opponents[key].w++:opponents[key].l++});const oppRows=Object.values(opponents).sort((a,b)=>(b.w+b.l)-(a.w+a.l));$("recordOpponentList").innerHTML=oppRows.length?oppRows.map(o=>`<article class="opponent"><span class="opponent-name">${esc(o.name)}</span><span class="opponent-score">${o.w}승 ${o.l}패</span><span>${o.w+o.l}전</span></article>`).join(""):'<div class="empty">상대 전적이 없습니다.</div>';$("recordList").innerHTML=rows.length?rows.map(row=>{const win=rowWin(row,recordState.userId),opp=win?rowName(row,"loser"):rowName(row,"winner");return `<article class="record"><span>${esc(recordDate(row))}</span><b class="record-result ${win?"win":"lose"}">${win?"승":"패"}</b><span class="record-opponent">${esc(opp||"상대 정보 없음")}</span></article>`}).join(""):'<div class="empty">표시할 전적이 없습니다.</div>';$("recordList").classList.toggle("hidden",recordState.view!=="matches");$("recordOpponentList").classList.toggle("hidden",recordState.view!=="opponents");document.querySelectorAll("[data-record-view]").forEach(b=>b.classList.toggle("active",b.dataset.recordView===recordState.view))}
  async function openRecords(userId,race,name,image){recordState={userId,race,name,rows:[],view:"matches"};$("recordTitle").textContent=name+" 전적";$("recordPlayer").innerHTML=`<div class="record-player"><img class="record-player-avatar" src="${safe(image||TEAM.logo)}" alt=""><div><div class="record-player-name">${esc(name)}</div><div class="record-player-sub">${esc(raceName(race))} · 전적 요약</div></div></div>`;$("recordSummary").innerHTML="";$("recordList").innerHTML='<div class="empty">전적 불러오는 중</div>';$("recordOpponentList").innerHTML="";$("recordPeriod").value="ALL";$("recordModal").classList.add("open");try{const key=safeKey(userId+"_"+race);const r=await fetch(FIREBASE_ROOT+"/records/"+encodeURIComponent(key)+".json",{cache:"no-store"});recordState.rows=normalizeList(await r.json()).slice().reverse();renderRecordModal()}catch(e){$("recordList").innerHTML='<div class="empty">전적 데이터를 불러오지 못했습니다.</div>'}}
  function openPage(name){document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id===name));document.querySelectorAll(".nav [data-page]").forEach(b=>b.classList.toggle("active",b.dataset.page===name));$("moreBtn").classList.toggle("active",["profile","inout","boja","fantube"].includes(name));$("pageName").textContent=({dashboard:"현황판",profile:"프로필",tier:"티어표",notice:"공지",schedule:"일정표",inout:"IN&OUT",boja:"보자충",fantube:"팬튜브"})[name]||name;localStorage.setItem("monstarz-mobile-tab",name);window.scrollTo(0,0);if(name==="tier"&&!tierPlayers.length)fetchTier()}
  function openSheet(){$("moreSheet").classList.add("open");document.body.style.overflow="hidden"}function closeSheet(){$("moreSheet").classList.remove("open");document.body.style.overflow=""}
  document.querySelectorAll(".nav [data-page]").forEach(b=>b.onclick=()=>openPage(b.dataset.page));$("moreBtn").onclick=openSheet;$("sheetClose").onclick=closeSheet;$("moreSheet").onclick=e=>{if(e.target===$("moreSheet"))closeSheet()};document.querySelectorAll("[data-more-page]").forEach(b=>b.onclick=()=>{closeSheet();openPage(b.dataset.morePage)});$("recordClose").onclick=()=>$("recordModal").classList.remove("open");$("recordModal").onclick=e=>{if(e.target===$("recordModal"))$("recordModal").classList.remove("open")};
  $("profileSearch").oninput=e=>renderProfileOptions(e.target.value);$("profileSelect").onchange=e=>{selectedProfileName=e.target.value;renderProfileDetail()};$("inoutSearch").oninput=renderInout;$("inoutFilter").onclick=e=>{const b=e.target.closest("button");if(!b)return;inoutMode=b.dataset.value;document.querySelectorAll("#inoutFilter button").forEach(x=>x.classList.toggle("active",x===b));renderInout()};$("tierSearch").oninput=renderTier;$("tierTier").onchange=e=>{tierFilter=e.target.value;renderTier()};$("tierRace").onchange=renderTier;$("tierLiveFilter").onclick=e=>{const b=e.target.closest("button");if(!b)return;tierLiveMode=b.dataset.live;document.querySelectorAll("#tierLiveFilter button").forEach(x=>x.classList.toggle("active",x===b));renderTier()};$("recordPeriod").onchange=renderRecordModal;document.querySelectorAll("[data-record-view]").forEach(b=>b.onclick=()=>{recordState.view=b.dataset.recordView;renderRecordModal()});$("refreshBtn").onclick=()=>{fetchLive();fetchNotices();fetchFantube();if(tierPlayers.length)fetchTier()};
  $("statRecent").textContent=INOUT_HISTORY.at(-1)?.date||"-";renderDashboard();renderProfileOptions();renderInout();renderBoja();fetchLive();fetchNotices();fetchFantube();setInterval(fetchLive,60000);openPage(localStorage.getItem("monstarz-mobile-tab")||"dashboard");

</script>
