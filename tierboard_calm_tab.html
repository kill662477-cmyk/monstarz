<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>스타크래프트 티어표 | 캄몬스타즈</title>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://jddcontens-default-rtdb.asia-southeast1.firebasedatabase.app">
  <link rel="preconnect" href="https://profile.img.sooplive.co.kr">
  <style>
    :root {
      --brand: #3499cf;
      --brand-dark: #277fb0;
      --bg: #ffffff;
      --surface: #ffffff;
      --muted: #f6f8fa;
      --line: rgba(15, 23, 42, .12);
      --text: #111827;
      --soft: #64748b;
      --terran: #0878cf;
      --zerg: #7d46c9;
      --protoss: #f08917;
      --live: #f43f5e;
      --green: #65bd46;
      --shadow: 0 1px 2px rgba(15, 23, 42, .06), 0 8px 24px rgba(15, 23, 42, .04);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }
    a { color: inherit; }
    button, input, select { font: inherit; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      height: 62px;
      display: flex;
      align-items: center;
      padding: 0 22px;
      background: var(--brand);
      color: #fff;
      box-shadow: inset 0 -1px rgba(0,0,0,.12);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 210px;
    }
    .logo img { height: 32px; width: auto; object-fit: contain; }
    .logo-mark {
      height: 32px;
      min-width: 88px;
      padding: 0 12px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 950;
      letter-spacing: 0;
    }
    .icon-button {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: currentColor;
      cursor: pointer;
    }
    .icon-button:hover { background: rgba(255,255,255,.12); }
    .nav {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 46px;
      font-weight: 600;
      white-space: nowrap;
    }
    .nav span { display: inline-flex; align-items: center; gap: 8px; }
    .actions { display: flex; align-items: center; gap: 8px; }
    .subbar {
      height: 60px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: #fff;
    }
    .crumb {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: #f4f6f8;
      color: #374151;
    }
    main {
      width: min(1180px, calc(100% - 48px));
      margin: 26px auto 44px;
    }
    .sources {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      color: #374151;
      margin: 0 0 18px;
    }
    .sources a { text-decoration: underline; text-underline-offset: 2px; }
    .notice {
      border-left: 4px solid #2196df;
      background: #d9eaff;
      border-radius: 8px;
      padding: 16px 20px 14px;
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 12px;
      margin-bottom: 22px;
    }
    .notice-title { font-weight: 800; color: #1f4f93; margin-bottom: 8px; }
    .notice p { margin: 8px 0 0; }
    .notice strong.red { color: #d23b69; }
    .notice strong.green { color: #1b9b72; }
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .switches, .filters { display: flex; align-items: center; gap: 12px; }
    .switch-label { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; color: #111827; }
    .switch-label input { position: absolute; opacity: 0; pointer-events: none; }
    .switch-ui {
      width: 42px;
      height: 26px;
      border-radius: 999px;
      background: #e5e7eb;
      border: 1px solid rgba(15,23,42,.08);
      position: relative;
      transition: .2s ease;
    }
    .switch-ui::after {
      content: "";
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: #fff;
      position: absolute;
      left: 1px;
      top: 1px;
      box-shadow: 0 1px 4px rgba(15,23,42,.22);
      transition: .2s ease;
    }
    .switch-label input:checked + .switch-ui { background: #fb2f49; }
    .switch-label input:checked + .switch-ui::after { transform: translateX(16px); }
    .switch-label input:not(:checked) + .switch-ui.live-switch { background: #f1f5f9; box-shadow: inset 0 0 0 2px #49c2e8; }
    select, .search {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334155;
      padding: 0 14px;
      outline: none;
      box-shadow: 0 1px 2px rgba(15,23,42,.03);
    }
    .search { width: 206px; }
    .tier-list-button {
      height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: #374151;
      font-weight: 800;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .chevrons { color: #d59d32; font-weight: 900; }
    .tier-stack { display: grid; gap: 16px; }
    .tier-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 24px 18px 20px;
      min-height: 164px;
      scroll-margin-top: 84px;
    }
    .tier-head {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      min-height: 34px;
      margin-bottom: 28px;
    }
    .tier-title {
      grid-column: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 800;
    }
    .tier-tools { grid-column: 3; justify-self: end; display: inline-flex; align-items: center; gap: 10px; color: #111827; }
    .timer { font-size: 13px; font-weight: 700; min-width: 58px; text-align: right; }
    .players {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 16px;
    }
    .race-group { width: 100%; display: contents; }
    .race-group-title {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #475569;
      font-weight: 800;
      margin: 4px 0 -2px;
    }
    .race-dot { width: 9px; height: 9px; border-radius: 99px; display: inline-block; }
    .race-dot.T, .race-dot.테란 { background: var(--terran); }
    .race-dot.Z, .race-dot.저그 { background: var(--zerg); }
    .race-dot.P, .race-dot.프로토스 { background: var(--protoss); }
    .player-card {
      position: relative;
      width: 142px;
      height: 195px;
      border: 4px solid var(--race-color);
      border-radius: 8px;
      background: var(--race-color);
      overflow: hidden;
      color: #fff;
      box-shadow: 0 1px 4px rgba(15,23,42,.16);
    }
    .player-card:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(15,23,42,.16); }
    .player-card.is-selected {
      outline: 3px solid #22c55e;
      outline-offset: 3px;
    }
    .player-card:hover .player-actions,
    .player-card:focus-within .player-actions,
    .player-card.actions-open .player-actions {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .player-image {
      height: 145px;
      position: relative;
      background: #f3f4f6;
      overflow: hidden;
    }
    .player-image > img.main-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1) contrast(1.05);
      display: block;
    }
    .player-card.live .player-image > img.main-img { filter: none; }
    .player-actions {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 7px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(15, 23, 42, .74), rgba(15, 23, 42, .88));
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }
    .card-action {
      min-height: 30px;
      border: 1px solid rgba(255,255,255,.32);
      border-radius: 7px;
      background: rgba(255,255,255,.13);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }
    .card-action:hover,
    .card-action:focus-visible {
      background: rgba(255,255,255,.23);
      outline: none;
    }
    .card-action[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: .48;
      pointer-events: none;
    }
    .academy-badge {
      position: absolute;
      top: 7px;
      left: 7px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(255,255,255,.9);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,.65);
      box-shadow: 0 1px 5px rgba(0,0,0,.22);
    }
    .academy-badge img { width: 100%; height: 100%; object-fit: cover; }
    .live-badge {
      position: absolute;
      top: 7px;
      right: 7px;
      height: 22px;
      padding: 0 8px;
      border-radius: 7px;
      background: var(--live);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: 0;
    }
    .live-dot { width: 6px; height: 6px; border-radius: 999px; background: #fff; }
    .win-rate {
      position: absolute;
      left: 8px;
      bottom: 8px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(15,23,42,.72);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      color: #fff;
      border: 3px solid #27e30d;
      box-shadow: inset 0 0 0 2px rgba(15,23,42,.55);
    }
    .player-info {
      height: 42px;
      display: grid;
      grid-template-columns: 24px 1fr 24px;
      align-items: center;
      gap: 3px;
      padding: 0 6px;
      font-weight: 900;
    }
    .player-info a { display: inline-flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; }
    .player-name { text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
    .elo-badge {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: #7ac346;
      color: #f4ffe7;
      font-size: 10px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0;
      text-decoration: none;
    }
    .elo-badge.disabled { opacity: .48; pointer-events: none; }
    .race-T { --race-color: var(--terran); }
    .race-Z { --race-color: var(--zerg); }
    .race-P { --race-color: var(--protoss); }
    .empty {
      color: #94a3b8;
      font-weight: 700;
      padding: 20px 0;
    }
    .selection-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 12px 14px;
      margin: 0 0 16px;
    }
    .selection-panel[hidden] { display: none; }
    .selection-head {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .selection-head select { height: 34px; }
    .selection-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 12px;
    }
    .selection-player,
    .selection-empty {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 900;
      text-align: center;
      background: #f8fafc;
    }
    .selection-score {
      min-width: 112px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #64748b;
      font-weight: 900;
    }
    .selection-score strong {
      color: #111827;
      font-size: 18px;
    }
    .selection-tooltip {
      color: #ef4444;
      font-size: 12px;
      font-weight: 800;
      margin-top: 8px;
      text-align: center;
    }
    .floating-tier {
      position: fixed;
      right: 28px;
      bottom: 32px;
      z-index: 30;
      box-shadow: 0 8px 20px rgba(15,23,42,.12);
    }
    .contact-float {
      position: fixed;
      right: 24px;
      bottom: 84px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: #20aeea;
      color: #fff;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(20, 155, 213, .28);
    }
    footer {
      border-top: 1px solid var(--line);
      padding: 22px 24px 28px;
      color: #64748b;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    dialog {
      border: 0;
      border-radius: 8px;
      padding: 0;
      width: min(440px, calc(100% - 28px));
      box-shadow: 0 28px 80px rgba(15,23,42,.26);
    }
    dialog::backdrop { background: rgba(15,23,42,.4); }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 900;
    }
    .modal-list { padding: 12px 14px 16px; display: grid; gap: 8px; }
    .record-dialog { width: min(720px, calc(100% - 28px)); }
    .record-body { padding: 14px 18px 18px; display: grid; gap: 12px; max-height: calc(100vh - 150px); overflow: auto; }
    .record-alert {
      border-radius: 8px;
      border: 1px solid rgba(59,130,246,.2);
      background: #eff6ff;
      color: #334155;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      font-size: 13px;
    }
    .record-controls { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .record-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .record-stat {
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      padding: 12px;
      box-shadow: 0 1px 4px rgba(15,23,42,.05);
    }
    .record-stat-label { font-size: 12px; font-weight: 900; color: #64748b; }
    .record-stat-total { font-size: 18px; font-weight: 900; margin-top: 4px; }
    .record-stat-rate { font-weight: 900; margin-top: 2px; }
    .record-stat-rate.high { color: #16a34a; }
    .record-stat-rate.mid { color: #ca8a04; }
    .record-stat-rate.low { color: #ef4444; }
    .record-bar { height: 4px; border-radius: 99px; background: #e5e7eb; overflow: hidden; margin-top: 7px; }
    .record-bar span { display: block; height: 100%; border-radius: inherit; }
    .record-table-wrap { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .record-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .record-table th,
    .record-table td { padding: 9px 10px; border-bottom: 1px solid #eef2f7; text-align: center; }
    .record-table th { background: #f8fafc; color: #475569; font-weight: 900; }
    .record-table tr:last-child td { border-bottom: 0; }
    .record-win { color: #2563eb; font-weight: 900; }
    .record-lose { color: #64748b; font-weight: 900; }
    .record-empty { padding: 18px; text-align: center; color: #94a3b8; font-weight: 800; }
    .tier-link {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: pointer;
      color: #1f2937;
      font-weight: 800;
    }
    .tier-link:hover { background: #f8fafc; }
    svg { width: 20px; height: 20px; stroke: currentColor; }
    @media (max-width: 820px) {
      .topbar { padding: 0 14px; }
      .logo { min-width: auto; }
      .logo img { height: 28px; }
      .logo-mark { height: 28px; min-width: 74px; font-size: 13px; }
      .nav { display: none; }
      .actions { margin-left: auto; }
      main { width: min(100% - 24px, 1180px); margin-top: 18px; }
      .sources { align-items: flex-start; }
      .controls { align-items: stretch; flex-direction: column; }
      .switches, .filters { flex-wrap: wrap; }
      .search { flex: 1; min-width: 180px; width: auto; }
      .tier-head { grid-template-columns: 1fr; gap: 8px; }
      .tier-title, .tier-tools { grid-column: auto; justify-self: center; }
      .player-card { width: 132px; height: 184px; }
      .player-image { height: 136px; }
      .player-actions { padding: 12px; }
      .card-action { min-height: 28px; font-size: 11px; }
      .selection-body { grid-template-columns: 1fr; }
      .selection-score { min-height: 26px; }
      .record-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .floating-tier { right: 16px; bottom: 20px; }
      .contact-float { right: 16px; bottom: 72px; }
      footer { padding-bottom: 82px; }
    }
  

    /* 캄몬스타즈 탭 전용 리디자인: 원본 공식홈 상단/푸터 느낌 제거 */
    :root {
      --brand: #2f89ff;
      --brand-dark: #0f5bd3;
      --bg: #08182c;
      --surface: rgba(13, 33, 58, .92);
      --muted: rgba(219, 234, 254, .78);
      --line: rgba(142, 193, 255, .18);
      --text: #eef6ff;
      --soft: #9fb8d8;
      --terran: #2f89ff;
      --zerg: #a855f7;
      --protoss: #f8bd38;
      --live: #ff4d67;
      --green: #34d399;
      --shadow: 0 16px 36px rgba(0, 0, 0, .30);
    }
    html, body { min-height: 100%; overflow-x: hidden; }
    body.calm-tier-page {
      background:
        radial-gradient(circle at 14% 0%, rgba(47,137,255,.34), transparent 32%),
        radial-gradient(circle at 92% 10%, rgba(255,212,59,.12), transparent 24%),
        linear-gradient(180deg, #07172a 0%, #0b2d58 48%, #061323 100%);
      color: var(--text);
      font-family: "Pretendard", "Inter", "Noto Sans KR", system-ui, sans-serif;
      padding: 0;
    }
    main.calm-tier-main { width: min(100%, 1138px); margin: 0 auto; padding: 10px 0 24px; }
    .calm-tier-hero {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 112px;
      margin: 0 0 12px;
      padding: 18px 20px;
      border: 1px solid rgba(137,192,255,.24);
      border-radius: 0 0 20px 20px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
        radial-gradient(circle at 50% -18%, rgba(255,216,77,.18), transparent 35%),
        linear-gradient(135deg, rgba(9,40,82,.97), rgba(11,67,127,.92));
      background-size: 36px 100%, auto, auto;
      box-shadow: 0 18px 38px rgba(0,0,0,.30);
    }
    .calm-tier-hero::after {
      content: "TIER";
      position: absolute;
      right: 18px;
      bottom: -22px;
      color: rgba(255,255,255,.055);
      font-size: 86px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -.08em;
      pointer-events: none;
    }
    .calm-tier-kicker { color: #9fd0ff; font-size: 11px; font-weight: 950; letter-spacing: .12em; }
    .calm-tier-hero h1 { margin: 4px 0 4px; color: #fff; font-size: 28px; font-weight: 950; letter-spacing: -.055em; }
    .calm-tier-hero p { max-width: 680px; margin: 0; color: #c9ddf5; font-size: 12px; font-weight: 800; line-height: 1.55; }
    .calm-tier-mini-stats {
      position: relative;
      z-index: 1;
      min-width: 150px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.055);
      border-radius: 14px;
      text-align: right;
    }
    .calm-tier-mini-stats span { display: block; color: #aac4e4; font-size: 10px; font-weight: 900; }
    .calm-tier-mini-stats strong { display: block; color: #fff; margin-top: 2px; font-size: 18px; font-weight: 950; }
    .sources, .contact-float, .floating-tier, footer { display: none !important; }

    function safeKey(value) {
      return String(value || '').replace(/[.#$/\[\]]/g, '_');
    }

    function normalizeList(value) {
      if (Array.isArray(value)) return value;
      if (!value || typeof value !== 'object') return [];
      if (Array.isArray(value.data)) return value.data;
      if (Array.isArray(value.rows)) return value.rows;
      return Object.values(value);
    }

    function playerDataKey(player) {
      return safeKey([player.userId || player.name, player.race || ''].join('_'));

    function extractSoopUserId(player) {
      if (player && player.userId) return String(player.userId);
      const stationMatch = String((player && player.station) || '').match(/sooplive\.com\/station\/([^/?#]+)/i);
      if (stationMatch) return stationMatch[1];
      const broadcastMatch = String((player && player.broadcastUrl) || '').match(/play\.sooplive\.com\/([^/?#]+)/i);
      if (broadcastMatch) return broadcastMatch[1];
      const imageMatch = String((player && player.image) || '').match(/\/LOGO\/[^/]+\/([^/]+)\//i);
      if (imageMatch) return imageMatch[1];
      return '';
    }

    function isLiveMetaKey(key) {
      return String(key || '').startsWith('__') || ['meta', 'updatedAt', 'checkedAt', 'source'].includes(String(key || ''));
    }

    function getLiveInfo(player, liveMap) {
      const userId = extractSoopUserId(player);
      const keys = [
        userId,
        userId ? safeKey(userId) : '',
        playerDataKey({ userId: userId || player.userId || player.name, race: player.race }),
        playerDataKey(player)
      ].filter(Boolean);
      for (const key of keys) {
        if (Object.prototype.hasOwnProperty.call(liveMap || {}, key)) return liveMap[key];
      }
      return null;
    }

    function hasUsableLiveMap(liveMap) {
      return Object.keys(liveMap || {}).some(function(key) { return !isLiveMetaKey(key); });
    }

    function canMatchAnyLiveStatus(players, liveMap) {
      if (!hasUsableLiveMap(liveMap)) return false;
      return players.some(function(player) { return getLiveInfo(player, liveMap) !== null; });
    }

    function livePatch(player, liveMap, forceOfflineWhenMissing) {
      const userId = extractSoopUserId(player);
      const liveInfo = getLiveInfo(player, liveMap || {});
      const basePlayer = userId && !player.userId ? { ...player, userId } : player;
      if (liveInfo === null || liveInfo === undefined) {
        return forceOfflineWhenMissing && userId
          ? { ...basePlayer, live: false, broad: null, broadcastUrl: '' }
          : basePlayer;
      }
      const isLive = typeof liveInfo === 'boolean'
        ? liveInfo
        : Boolean(liveInfo.live || liveInfo.status === 'live' || liveInfo.broadNo || liveInfo.broadcastUrl);
      const broadNo = typeof liveInfo === 'object' ? (liveInfo.broadNo || liveInfo.broad_no || '') : '';
      return {
        ...basePlayer,
        live: isLive,
        broad: typeof liveInfo === 'object' ? liveInfo : basePlayer.broad,
        broadcastUrl: isLive
          ? ((typeof liveInfo === 'object' && liveInfo.broadcastUrl) || (broadNo ? 'https://play.sooplive.com/' + userId + '/' + broadNo : basePlayer.broadcastUrl || basePlayer.liveUrl || (userId ? 'https://play.sooplive.com/' + userId : '')))
          : ''
      };
    }

    function applyLiveStatus(players, liveMap) {
      if (!Array.isArray(players) || !players.length) return players;
      if (!hasUsableLiveMap(liveMap)) {
        return players.map(function(player) {
          const userId = extractSoopUserId(player);
          return userId && !player.userId ? { ...player, userId } : player;
        });
      }
      const matched = canMatchAnyLiveStatus(players, liveMap);
      return players.map(function(player) { return livePatch(player, liveMap, matched); });
    }

    function isSafeImage(url) {
      const value = String(url || '');
      return value && !value.includes('cnine.kr') && !value.includes('dn.cnine.kr');
    }

    function recordBucket(player, race) {
      const records = firebaseState.records || {};
      const keys = [
        playerDataKey({ userId: player.userId, race: race }),
        safeKey(player.userId + '_' + race),
        player.userId + '_' + race,
        player.userId
      ];
      for (const key of keys) {
        if (!records[key]) continue;
        if (Array.isArray(records[key])) return records[key];
        if (records[key][race]) return normalizeList(records[key][race]);
        return normalizeList(records[key]);
      }
      return [];
    }

    function rowDate(row) {
      return String(row.date || row.standardDate || row.playedAt || row.createdAt || '').slice(0, 10);
    }

    function rowWinnerId(row) {
      return String(row.winnerSoopUserId || row.winnerUserId || row.winnerId || row.winner || '');
    }

    function rowLoserId(row) {
      return String(row.loseSoopUserId || row.loserSoopUserId || row.loseUserId || row.loserUserId || row.loserId || '');
    }

    function rowOpponentName(row, userId) {
      const win = rowWinnerId(row) === String(userId);
      return win ? (row.losePlayer || row.loserPlayer || row.loseName || row.opponentName || '') : (row.winnerPlayer || row.winnerName || row.opponentName || '');
    }

    function rowOpponentRace(row, userId) {
      const win = rowWinnerId(row) === String(userId);
      return win ? (row.loseRace || row.loserRace || row.opponentRace || '') : (row.winnerRace || row.opponentRace || '');
    }

    function rowIsWin(row, userId) {
      if (rowWinnerId(row)) return rowWinnerId(row) === String(userId);
      return String(row.result || row.win || '').toLowerCase() === 'win' || row.isWin === true;
    }

    function monthRows(rows, standardMonthValue) {
      const prefix = String(standardMonthValue || '').slice(0, 7);
      return rows.filter(function(row) { return rowDate(row).startsWith(prefix); });
    }

    function headToHeadKey(player, opponent, period) {
      return safeKey([player.userId, player.race, opponent.userId, opponent.race, period].join('_'));
    }

    function storedHeadToHead(player, opponent, period) {
      const data = firebaseState.headToHead || {};
      const direct = data[headToHeadKey(player, opponent, period)] || data[headToHeadKey(player, opponent, 'ALL')];
      const reverse = data[headToHeadKey(opponent, player, period)] || data[headToHeadKey(opponent, player, 'ALL')];
      if (direct) return { player1Wins: Number(direct.player1Wins || direct.wins || 0), player2Wins: Number(direct.player2Wins || direct.losses || 0) };
      if (reverse) return { player1Wins: Number(reverse.player2Wins || reverse.losses || 0), player2Wins: Number(reverse.player1Wins || reverse.wins || 0) };
      return null;
    }

    function normalizeFirebaseSnapshot(data) {
      const players = normalizeList(data.players || data.tierData || data.members);
      firebaseState.meta = data.meta || {};
      firebaseState.records = data.records || {};
      firebaseState.winRates = data.winRates || data.winRate || {};
      firebaseState.headToHead = data.headToHead || data.headToHeadSummary || {};
      firebaseState.liveStatus = data.liveStatus || data.statuses || {};
      if (players.length) {
        tierData = applyLiveStatus(players, firebaseState.liveStatus);
      } else {
        tierData = applyLiveStatus(tierData, firebaseState.liveStatus);
      }
    }

    function initFirebaseTierData() {
      if (!window.firebase || !window.firebase.database) return;
      try {
        if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
        firebaseDb = window.firebase.database();
        firebaseState.ready = true;
        firebaseDb.ref(FIREBASE_ROOT).on('value', function(snapshot) {
          normalizeFirebaseSnapshot(snapshot.val() || {});
          render();
          if (activeRecordKey) loadRecord();
          if (selection.playerKey && selection.opponentKey) loadHeadToHead();
        });
      } catch (error) {
        firebaseState.ready = false;
      }
    }

    function icon(name) {
      const icons = {
        star: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2-5.6-3-5.6 3 1.1-6.2L3 9.6l6.2-.9L12 3Z"></path></svg>',
        refresh: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4"></path><path d="M21 3v6h-6"></path></svg>',
        home: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12 3 12 12 3 21 12 19 12"></path><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"></path><path d="M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6"></path></svg>'

    function timeText() {
      const m = Math.floor(state.seconds / 60);
      const s = state.seconds % 60;

    }

    function filteredData() {
      const liveOnly = document.getElementById('liveOnly').checked;
      const race = document.getElementById('raceFilter').value;

        if (tier !== 'all' && player.tier !== tier) return false;
        if (q && !String(player.name || '').toLowerCase().includes(q)) return false;

      });
    }

    function groupedByTier(players) {
      const groups = new Map(tierOrder.map(function(tier) { return [tier, []]; }));
      players.forEach(function(player) {
        if (!groups.has(player.tier)) groups.set(player.tier, []);
        groups.get(player.tier).push(player);

    function playerKey(player) {
      return [player.tier, player.name, player.station || player.elo || player.image].join('|');

    function playerByKey(key) {
      return tierData.find(function(player) { return playerKey(player) === key; });
    }

    function playerCard(player) {
      const academy = player.academy && isSafeImage(player.academy.image) ? '<span class="academy-badge" title="' + escapeAttr(player.academy.name) + '"><img src="' + escapeAttr(player.academy.image) + '" alt="' + escapeAttr(player.academy.name) + '"></span>' : '';
      const live = player.live ? '<span class="live-badge"><span class="live-dot"></span>LIVE</span>' : '';

    function renderPlayers(players) {

    function render() {

      const visibleTiers = selectedTier === 'all'

          '<div class="tier-tools"><button class="icon-button refresh" type="button" title="지금 새로고침" aria-label="지금 새로고침">' + icon('refresh') + '</button><span class="timer">' + timeText() + '</span></div></div>' +
          '<div class="players">' + renderPlayers(players) + '</div></section>';

    function toggleHeadSelection(key) {
      if (selection.playerKey === key) {
        selection.playerKey = '';
      } else if (selection.opponentKey === key) {
        selection.opponentKey = '';
      } else if (!selection.playerKey) {
        selection.playerKey = key;
      } else {
        selection.opponentKey = key;
      }
      selection.result = null;
      render();
      loadHeadToHead();

    function clearHeadSelection() {
      selection.playerKey = '';
      selection.opponentKey = '';
      selection.result = null;
      renderSelection();

    function renderSelection() {
      const player = playerByKey(selection.playerKey);
      const opponent = playerByKey(selection.opponentKey);
      selectionPanel.hidden = !player && !opponent;
      if (!player && !opponent) return;
      const score = selection.loading
        ? '<span>불러오는 중</span>'
        : '<strong>' + (selection.result ? selection.result.player1Wins : '?') + '</strong><span>VS</span><strong>' + (selection.result ? selection.result.player2Wins : '?') + '</strong>';
      selectionBody.innerHTML = compactPlayer(player) + '<div class="selection-score">' + score + '</div>' + compactPlayer(opponent);
      selectionHint.textContent = player && opponent ? '' : '상대 플레이어를 선택해주세요';

    function compactPlayer(player) {
      if (!player) return '<div class="selection-empty">선택 전</div>';
      return '<div class="selection-player">' + escapeHtml(player.name) + ' ' + escapeHtml(player.race) + '</div>';

    function headDates(period) {
      const first = new Date(currentYear, currentMonth - 1, 1);
      const format = function(date) {
        return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-01';
      };
      if (period === 'ALL') {
        const years = [];
        for (let year = 2018; year <= currentYear; year += 1) years.push(String(year));
        return { timeType: 'YEAR', standardDates: years.join(',') };
      }
      const count = period === 'LAST_2_MONTHS' ? 2 : period === 'LAST_1_MONTHS' ? 1 : 3;
      return {
        timeType: 'MONTH',
        standardDates: Array.from({ length: count }, function(_, index) {
          return format(new Date(first.getFullYear(), first.getMonth() - index, 1));
        }).join(',')
      };
    }

    function headMonthPrefixes(period) {
      if (period === 'ALL') return null;
      const count = period === 'LAST_2_MONTHS' ? 2 : period === 'LAST_1_MONTHS' ? 1 : 3;
      return Array.from({ length: count }, function(_, index) {
        const date = new Date(currentYear, currentMonth - 1 - index, 1);
        return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
      });
    }

    function rowMatchesOpponent(row, player, opponent) {
      const ids = [
        row.winnerSoopUserId,
        row.loseSoopUserId,
        row.loserSoopUserId,
        row.winnerUserId,
        row.loseUserId,
        row.loserUserId,
        row.opponentSoopUserId,
        row.opponentUserId
      ].map(function(value) { return String(value || ''); });
      if (ids.includes(String(opponent.userId || ''))) return true;
      const name = rowOpponentName(row, player.userId).trim();
      return Boolean(name && name === opponent.name);
    }

    function inHeadPeriod(row, period) {
      const prefixes = headMonthPrefixes(period);
      if (!prefixes) return true;
      const date = rowDate(row);
      return prefixes.some(function(prefix) { return date.startsWith(prefix); });
    }

    function loadHeadToHead() {
      const player = playerByKey(selection.playerKey);
      const opponent = playerByKey(selection.opponentKey);
      if (!player || !opponent) {
        renderSelection();
        return;
      }
      selection.loading = true;
      renderSelection();
      const stored = storedHeadToHead(player, opponent, headPeriod.value);
      if (stored) {
        selection.result = stored;
        selection.loading = false;
        renderSelection();
        return;
      }
      const score = { player1Wins: 0, player2Wins: 0 };
      recordBucket(player, player.race).forEach(function(row) {
        if (!inHeadPeriod(row, headPeriod.value) || !rowMatchesOpponent(row, player, opponent)) return;
        if (rowIsWin(row, player.userId)) score.player1Wins += 1;
        else score.player2Wins += 1;
      });
      selection.result = score;
      selection.loading = false;
      renderSelection();
    }

    function openRecord(key) {
      const player = playerByKey(key);
      if (!player) return;
      activeRecordKey = key;
      recordRace.value = player.race;
      recordYear.value = String(currentYear);
      recordMonth.value = String(currentMonth);
      recordDialog.showModal();
      loadRecord();
    }

    function standardMonth() {
      return recordYear.value + '-' + String(recordMonth.value).padStart(2, '0') + '-01';
    }

    function loadRecord() {
      const player = playerByKey(activeRecordKey);
      if (!player) return;
      recordTitle.textContent = player.name + ' ' + recordYear.value + '년 ' + recordMonth.value + '월 전적';
      const rows = recordBucket(player, recordRace.value)
        .slice()
        .sort(function(a, b) { return rowDate(b).localeCompare(rowDate(a)); });
      const monthlyRows = monthRows(rows, standardMonth());
      recordUpdated.textContent = formatDateTime(firebaseState.meta.eloboardUpdatedAt || firebaseState.meta.updatedAt || firebaseState.meta.syncedAt || '');
      if (!rows.length) {
        recordStats.innerHTML = '<div class="record-empty">전적 데이터를 불러오지 못했습니다.</div>';
        recordTable.innerHTML = '<div class="record-empty">전적 데이터를 불러오지 못했습니다.</div>';
        return;
      }
      renderRecordStats(computeRecordStats(monthlyRows, player));
      renderRecordTable(rows.slice(0, 20), player);
    }

    function computeRecordStats(rows, player) {
      const stats = { A: emptyStat('A'), Z: emptyStat('Z'), T: emptyStat('T'), P: emptyStat('P') };
      rows.forEach(function(row) {
        const code = rowOpponentRace(row, player.userId);
        const win = rowIsWin(row, player.userId);
        ['A', code].forEach(function(key) {
          if (!stats[key]) return;
          stats[key].totalCount += 1;
          if (win) stats[key].wins += 1;
          else stats[key].losses += 1;
          stats[key].winRate = stats[key].totalCount ? (stats[key].wins / stats[key].totalCount) * 100 : 0;
        });
      });
      return ['A', 'Z', 'T', 'P'].map(function(code) { return stats[code]; });
    }

    function renderRecordStats(rows) {
      const stats = { A: emptyStat('A'), Z: emptyStat('Z'), T: emptyStat('T'), P: emptyStat('P') };
      rows.forEach(function(row) {
        if (stats[row.opponentRace]) stats[row.opponentRace] = row;
      });
      recordStats.innerHTML = ['A', 'Z', 'T', 'P'].map(function(code) {
        const stat = stats[code];
        const rate = Number(stat.winRate || 0);
        const cls = rate >= 60 ? 'high' : rate >= 50 ? 'mid' : 'low';
        return '<div class="record-stat"><div class="record-stat-label">' + opponentRaceName[code] + '</div>' +
          '<div class="record-stat-total">' + Number(stat.totalCount || 0) + ' 게임</div>' +
          '<div class="record-stat-rate ' + cls + '">' + rate.toFixed(1) + '%</div>' +
          '<div class="record-stat-label">승 ' + Number(stat.wins || 0) + ' · 패 ' + Number(stat.losses || 0) + '</div>' +
          '<div class="record-bar"><span class="' + cls + '" style="width:' + Math.max(0, Math.min(100, rate)) + '%; background: currentColor"></span></div></div>';
      }).join('');
    }

    function emptyStat(code) {
      return { opponentRace: code, totalCount: 0, wins: 0, losses: 0, winRate: 0 };
    }

    function renderRecordTable(rows, player) {
      if (!rows.length) {
        recordTable.innerHTML = '<div class="record-empty">표시할 전적이 없습니다.</div>';
        return;
      }
      recordTable.innerHTML = '<table class="record-table"><thead><tr><th>날짜</th><th>상대</th><th>맵</th></tr></thead><tbody>' +
        rows.map(function(row) {
          const win = rowIsWin(row, player.userId);
          const opponent = rowOpponentName(row, player.userId);
          const opponentRace = rowOpponentRace(row, player.userId);
          return '<tr><td class="' + (win ? 'record-win' : 'record-lose') + '">' + formatDate(row.date || row.standardDate) + '</td>' +
            '<td>' + escapeHtml((opponent || '') + ' ' + (opponentRace || '')) + '</td>' +
            '<td>' + escapeHtml(row.map || row.mapName || '') + '</td></tr>';
        }).join('') + '</tbody></table>';
    }

    function updateTimers() {
      document.querySelectorAll('.timer').forEach(function(timer) { timer.textContent = timeText(); });
    }

    function formatDate(value) {
      const text = String(value || '');
      if (!text) return '-';
      return text.slice(0, 10).replace(/-/g, '.');
    }

    function formatDateTime(value) {
      const text = String(value || '');
      if (!text) return 'Firebase 동기화 대기';
      return text.replace('T', ' ').slice(0, 16);
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"]/g, function(ch) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[ch]; });
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/'/g, '&#39;'); }

    recordYear.innerHTML = years.map(function(year) { return '<option value="' + year + '">' + year + '년</option>'; }).join('');
    recordMonth.innerHTML = Array.from({ length: 12 }, function(_, index) {
      const month = index + 1;
      return '<option value="' + month + '">' + month + '월</option>';
    }).join('');

    ['liveOnly', 'raceSplit', 'raceFilter', 'tierFilter', 'searchInput'].forEach(function(id) {
      document.getElementById(id).addEventListener(id === 'searchInput' ? 'input' : 'change', render);
    });
    document.getElementById('clearSelection').addEventListener('click', clearHeadSelection);
    document.getElementById('closeRecord').addEventListener('click', function() { recordDialog.close(); });
    headPeriod.addEventListener('change', loadHeadToHead);
    [recordRace, recordYear, recordMonth].forEach(function(control) { control.addEventListener('change', loadRecord); });
    tierStack.addEventListener('click', function(event) {
      const recordButton = event.target.closest('.record-action');
      if (recordButton) {
        openRecord(recordButton.dataset.playerKey);
        return;
      }
      const headButton = event.target.closest('.head-action');
      if (headButton) {
        toggleHeadSelection(headButton.dataset.playerKey);
        return;
      }
      const card = event.target.closest('.player-card');
      if (!card || event.target.closest('a, button')) return;
      const wasOpen = card.classList.contains('actions-open');
      tierStack.querySelectorAll('.player-card.actions-open').forEach(function(openCard) { openCard.classList.remove('actions-open'); });
      if (!wasOpen) card.classList.add('actions-open');
    });
    document.addEventListener('click', function(event) {
      if (event.target.closest('.player-card')) return;
      tierStack.querySelectorAll('.player-card.actions-open').forEach(function(openCard) { openCard.classList.remove('actions-open'); });
    });
    setInterval(function() {
      state.seconds = state.seconds <= 0 ? 300 : state.seconds - 1;
      updateTimers();
    }, 1000);
    render();
    initFirebaseTierData();
  </script>
</body>
</html>
