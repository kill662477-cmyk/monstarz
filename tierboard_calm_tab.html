  <style>

 rgba(57,225,115,.35);border-radius:999px;background:rgba(57,225,115,.10);color:#66f293;font-weight:950}.load-more-btn:hover{background:rgba(57,225,115,.17);border-color:rgba(57,225,115,.58)}.source-link{display:inline-flex;align-items:center;min-height:30px;padding:0 10px;border-radius:999px;border:1px solid var(--line);background:rgba(90,167,255,.08);font-weight:900;color:#cfe7ff}

<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="top-row">
        <div class="brand"><div class="brand-mark"></div><div class="brand-title">캄몬스타즈 티어표</div></div>
        <div class="stats" aria-label="티어표 통계">
          <div class="stat">전체 <strong id="statTotal">0명</strong></div>
          <div class="stat">방송중 <strong class="live" id="statLive">0명</strong></div>
          <div class="stat"><span class="race-letter T">T</span> <strong id="statT">0</strong></div>
          <div class="stat"><span class="race-letter Z">Z</span> <strong id="statZ">0</strong></div>
          <div class="stat"><span class="race-letter P">P</span> <strong id="statP">0</strong></div>
        </div>
        <div class="last-update">마지막 업데이트: <b id="lastUpdated">-</b></div>
      </div>
      <div class="filter-row">
        <div class="filter-left">
          <button class="pill active" type="button" data-filter="all">전체 보기</button>
          <button class="pill" type="button" data-filter="live">방송중만 보기 <span class="mini-live">LIVE</span></button>
          <button class="pill" type="button" data-race="T"><span class="race-letter T">T</span> 테란</button>
          <button class="pill" type="button" data-race="Z"><span class="race-letter Z">Z</span> 저그</button>
          <button class="pill" type="button" data-race="P"><span class="race-letter P">P</span> 프로토스</button>
          <button class="pill" type="button" data-tier="베이비티어">유스</button>
        </div>
        <div class="filter-right">
          <div class="searchbox"><input id="searchInput" type="search" placeholder="닉네임, 종족, 티어 검색..." autocomplete="off"><span class="search-ico">⌕</span></div>
          <button class="reset-btn" id="resetFilters" type="button">필터 초기화</button>
        </div>
      </div>
      <nav class="tier-nav" id="tierNav" aria-label="티어 바로가기"></nav>
    </header>

    <div class="filter-summary" id="filterSummary"></div>
    <main class="tier-stack" id="tierStack"></main>

    function renderRecordTable(rows,player,totalCount=rows.length){ if(!rows.length){ recordTable.innerHTML='<div class="record-empty">표시할 전적이 없습니다.</div>'; return; } const more=totalCount>rows.length?'<div class="load-more-row"><span>'+rows.length+' / '+totalCount+'경기 표시 중</span><button class="load-more-btn" type="button" data-record-more>더보기</button></div>':'<div class="load-more-row"><span>'+rows.length+' / '+totalCount+'경기 표시 중</span></div>'; recordTable.innerHTML='<table class="record-table"><thead><tr><th>날짜</th><th>상대</th><th>상대 종족</th><th>맵</th><th>결과</th></tr></thead><tbody>'+rows.map(row=>{ const win=rowIsWin(row,player); const opponent=rowOpponentName(row,player); const opponentRace=rowOpponentRace(row,player); return '<tr><td>'+formatDate(row.date||row.standardDate)+'</td><td class="'+(win?'record-win':'record-lose')+'">'+escapeHtml(opponent||'-')+'</td><td><span class="race-badge '+escapeAttr(opponentRace)+'">'+escapeHtml(opponentRace||'-')+'</span></td><td>'+escapeHtml(row.map||row.mapName||'-')+'</td><td><span class="record-result-badge '+(win?'win':'lose')+'">'+(win?'승':'패')+'</span></td></tr>'; }).join('')+'</tbody></table>'+more; }
    function playerEloLink(player,label){ if(!player||!player.elo) return ''; return '<a class="source-link" href="'+escapeAttr(player.elo)+'" target="_blank" rel="noopener">'+escapeHtml(label)+'</a>'; }

    function opponentCandidates(){ const player=playerByKey(activeRecordKey); const map=new Map(); activeRecordRows.forEach(row=>{ const name=rowOpponentName(row,player); if(!name) return; const p=tierData.find(x=>x.name===name) || { name, race:rowOpponentRace(row,player), tier:'', image:'' }; const key=playerKey(p); if(!map.has(key)) map.set(key,{player:p,count:0,last:rowDate(row)}); const item=map.get(key); item.count+=1; if(rowDate(row)>item.last) item.last=rowDate(row); }); return Array.from(map.entries()).map(([key,item])=>({key,...item})).sort((a,b)=>b.last.localeCompare(a.last)||b.count-a.count); }
    function renderHeadPane(){ const current=playerByKey(activeRecordKey); const candidates=opponentCandidates(); const q=opponentSearch.value.trim().toLowerCase(); const filtered=candidates.filter(item=>!q || [item.player.name,item.player.race,item.player.tier].join(' ').toLowerCase().includes(q)); opponentList.innerHTML=filtered.length?filtered.map(item=>'<button class="opponent-item '+(item.key===selectedOpponentKey?'active':'')+'" type="button" data-opponent-key="'+escapeAttr(item.key)+'"><img src="'+escapeAttr(item.player.image||current.image)+'" alt=""><span><b>'+escapeHtml(item.player.name)+'</b><small>'+(item.player.race?escapeHtml(item.player.race)+' · ':'')+item.count+'경기</small></span></button>').join(''):'<div class="record-empty">검색 결과가 없습니다.</div>'; recentOpponents.innerHTML='<span>최근 상대</span>'+candidates.slice(0,6).map(item=>'<button class="recent-chip" type="button" data-opponent-key="'+escapeAttr(item.key)+'">'+escapeHtml(item.player.name)+'</button>').join(''); if(!selectedOpponentKey && candidates.length){ headContent.innerHTML='<div class="loading-note">상대를 선택하면 '+headPeriodLabel()+' 기준 상대전적이 표시됩니다.</div>'; } }
    async function loadHeadToHead(){ const seq=++headLoadSeq; const player=playerByKey(activeRecordKey); const opponent=playerByKey(selectedOpponentKey) || opponentCandidates().find(x=>x.key===selectedOpponentKey)?.player; if(!player||!opponent){ headContent.innerHTML='<div class="loading-note">상대를 선택해주세요.</div>'; return; } headContent.innerHTML='<div class="loading-note">상대전적 계산 중입니다.</div>'; const period=headPeriodValue(); const stored=storedHeadToHead(player,opponent,period); let score=stored||{player1Wins:0,player2Wins:0,hasData:false,source:'computed'}; let matched=[]; const rows=activeRecordRows.length?activeRecordRows:await ensureRecordBucket(player,player.race); if(seq!==headLoadSeq) return; matched=rows.filter(row=>inHeadPeriod(row)&&rowMatchesOpponent(row,player,opponent)); if(!stored){ score={player1Wins:0,player2Wins:0,hasData:false,source:'computed'}; matched.forEach(row=>{ if(rowIsWin(row,player)) score.player1Wins+=1; else score.player2Wins+=1; }); score.hasData=matched.length>0; }
      const total=score.player1Wins+score.player2Wins; const rate=total?(score.player1Wins/total*100):0; headContent.innerHTML='<div class="h2h-score"><div class="side"><img src="'+escapeAttr(player.image)+'" alt=""><b>'+escapeHtml(player.name)+' <span class="race-badge '+escapeAttr(player.race)+'">'+escapeHtml(player.race)+'</span></b><small>'+escapeHtml(player.tier)+'</small></div><div class="versus"><div>'+headPeriodLabel()+' 상대전적</div><div class="score">'+total+'전 <span class="win">'+score.player1Wins+'승</span> <span class="lose">'+score.player2Wins+'패</span></div><div class="rate">승률 '+rate.toFixed(1)+'%</div></div><div class="side"><img src="'+escapeAttr(opponent.image||player.image)+'" alt=""><b>'+escapeHtml(opponent.name)+' <span class="race-badge '+escapeAttr(opponent.race)+'">'+escapeHtml(opponent.race||'-')+'</span></b><small>'+escapeHtml(opponent.tier||'전적 상대')+'</small></div></div><div class="record-table-wrap">'+headRowsTable(matched.slice(0,h2hVisibleCount),player,opponent,matched.length)+'</div><div class="source-row">'+playerEloLink(player,player.name+' ELO')+playerEloLink(opponent,opponent.name+' ELO')+'</div>'; }
    function headRowsTable(rows,player,opponent,totalCount=rows.length){ if(!rows.length) return '<div class="record-empty">'+headPeriodLabel()+' 경기 기록이 없거나 아직 동기화되지 않았습니다.</div>'; const more=totalCount>rows.length?'<div class="load-more-row"><span>'+rows.length+' / '+totalCount+'경기 표시 중</span><button class="load-more-btn" type="button" data-head-more>더보기</button></div>':'<div class="load-more-row"><span>'+rows.length+' / '+totalCount+'경기 표시 중</span></div>'; return '<table class="record-table"><thead><tr><th>날짜</th><th>맵</th><th>결과</th><th>승자</th><th>종족</th></tr></thead><tbody>'+rows.map(row=>{ const win=rowIsWin(row,player); return '<tr><td>'+formatDate(row.date||row.standardDate)+'</td><td>'+escapeHtml(row.map||row.mapName||'-')+'</td><td class="'+(win?'record-win':'record-lose')+'">'+escapeHtml(win?player.name+' 승':opponent.name+' 승')+'</td><td>'+escapeHtml(win?player.name:opponent.name)+'</td><td><span class="race-badge '+escapeAttr(player.race)+'">'+escapeHtml(player.race)+'</span> vs <span class="race-badge '+escapeAttr(opponent.race)+'">'+escapeHtml(opponent.race||'-')+'</span></td></tr>'; }).join('')+'</tbody></table>'+more; }

    recordYear.innerHTML='<option value="all">전체</option>'+years.map(year=>'<option value="'+year+'">'+year+'년</option>').join('');
    recordMonth.innerHTML='<option value="all">전체</option>'+Array.from({length:12},(_,i)=>'<option value="'+(i+1)+'">'+(i+1)+'월</option>').join('');
    document.querySelectorAll('.pill').forEach(btn=>btn.addEventListener('click',()=>{ if(btn.dataset.filter==='all'){ filters.liveOnly=false; filters.race='all'; filters.tier='all'; searchInput.value=''; } if(btn.dataset.filter==='live') filters.liveOnly=!filters.liveOnly; if(btn.dataset.race) filters.race=filters.race===btn.dataset.race?'all':btn.dataset.race; if(btn.dataset.tier) filters.tier=filters.tier===btn.dataset.tier?'all':btn.dataset.tier; render(); }));
    tierNav.addEventListener('click',e=>{ const btn=e.target.closest('[data-tier-nav]'); if(!btn) return; const t=btn.dataset.tierNav; filters.tier=filters.tier===t?'all':t; render(); setTimeout(()=>document.getElementById('tier-'+encodeURIComponent(t))?.scrollIntoView({behavior:'smooth',block:'start'}),30); });
    searchInput.addEventListener('input',render);
    document.getElementById('resetFilters').addEventListener('click',()=>{ filters.liveOnly=false; filters.race='all'; filters.tier='all'; searchInput.value=''; render(); });
    filterSummary.addEventListener('click',e=>{ const btn=e.target.closest('[data-remove-filter]'); if(!btn) return; const k=btn.dataset.removeFilter; if(k==='live') filters.liveOnly=false; if(k==='race') filters.race='all'; if(k==='tier') filters.tier='all'; if(k==='search') searchInput.value=''; render(); });
    tierStack.addEventListener('click',e=>{ const rec=e.target.closest('.record-action'); if(rec) openRecord(rec.dataset.playerKey); const toggle=e.target.closest('.live-first-toggle'); if(toggle){ filters.liveFirst=toggle.checked; render(); } });
    document.getElementById('closeRecord').addEventListener('click',()=>{ activeRecordKey=''; recordLoadSeq++; headLoadSeq++; recordDialog.close(); });
    tabOverall.addEventListener('click',()=>setTab('overall')); tabHead.addEventListener('click',()=>setTab('head'));
    [recordRace,recordYear,recordMonth].forEach(control=>control.addEventListener('change',()=>{ recordVisibleCount=RECORD_PAGE_SIZE; loadRecord(); }));
    if(headPeriod) headPeriod.addEventListener('change',()=>{ h2hVisibleCount=H2H_PAGE_SIZE; renderHeadPane(); if(selectedOpponentKey) loadHeadToHead(); });
    recordTable.addEventListener('click',e=>{ const btn=e.target.closest('[data-record-more]'); if(!btn) return; recordVisibleCount+=RECORD_PAGE_SIZE; renderActiveRecordView(); });
    headContent.addEventListener('click',e=>{ const btn=e.target.closest('[data-head-more]'); if(!btn) return; h2hVisibleCount+=H2H_PAGE_SIZE; loadHeadToHead(); });
    opponentSearch.addEventListener('input',renderHeadPane);
    opponentList.addEventListener('click',e=>{ const btn=e.target.closest('[data-opponent-key]'); if(!btn) return; selectedOpponentKey=btn.dataset.opponentKey; h2hVisibleCount=H2H_PAGE_SIZE; renderHeadPane(); loadHeadToHead(); });
    recentOpponents.addEventListener('click',e=>{ const btn=e.target.closest('[data-opponent-key]'); if(!btn) return; selectedOpponentKey=btn.dataset.opponentKey; h2hVisibleCount=H2H_PAGE_SIZE; renderHeadPane(); loadHeadToHead(); });
    render(); initFirebaseTierData();
  </script>
</body>
</html>
