/* ===================== 라이트 모드 (부모 페이지 테마 연동) ===================== */
html.light{
  --bg:#eef6ff; --bg2:#e3f0ff; --panel:#ffffff; --panel2:#f4f9ff;
  --line:rgba(40,98,160,.18); --line2:rgba(40,98,160,.30);
  --text:#12233a; --muted:#5a6e89; --soft:#3f5a7a;
  --green:#12a04a; --green2:#0f9042; --danger:#e0394d;
  --terran:#1f6fd6; --zerg:#d63b3b; --protoss:#b07d12;
  --shadow:0 20px 50px rgba(40,90,160,.16);
}
html.light body{background:radial-gradient(circle at 20% -10%,rgba(18,160,74,.10),transparent 32%),radial-gradient(circle at 90% 0%,rgba(31,111,214,.12),transparent 28%),linear-gradient(180deg,#f7fbff 0%,#eaf3ff 42%,#e1ecfb 100%);color:var(--text)}
html.light .app-header{background:rgba(247,251,255,.86);border-bottom-color:var(--line);box-shadow:0 16px 32px rgba(40,90,160,.10)}
html.light .stat{color:var(--soft)} html.light .stat strong{color:#10203a}
html.light .brand-mark{background:linear-gradient(135deg,#dbe9fb,#c4d6ee);border-color:rgba(40,90,160,.18)}

<script>
/* 부모 페이지(현황판)와 다크/라이트 테마 동기화 — 같은 도메인이라 localStorage 공유 */
(function(){
  var d=document.documentElement;
  function apply(v){ d.classList.toggle('light', v==='light'); }
  try{ apply(localStorage.getItem('monstarz-theme')); }catch(e){}
  window.addEventListener('storage', function(e){ if(e.key==='monstarz-theme') apply(e.newValue); });
  window.addEventListener('message', function(e){ if(e&&e.data&&e.data.type==='monstarz-theme') apply(e.data.value); });
})();
</script>

  document.addEventListener('mousemove',function(e){ if(cur) place(e); },{passive:true});
  document.addEventListener('mouseout',function(e){ var t=e.target.closest&&e.target.closest('.thumb'); if(!t||t!==cur) return; var to=e.relatedTarget; if(to&&t.contains(to)) return; cur=null; pv.classList.remove('show'); });
})();
</script>
