<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#07172d">
  <title>오류 안내 | 캄몬스타즈 팬허브</title>
  <link rel="icon" type="image/svg+xml" href="/assets/monstarz-icon.svg">
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Pretendard,"Malgun Gothic",system-ui,sans-serif;color:#f6f9ff;background:radial-gradient(circle at 80% 0%,rgba(246,185,59,.16),transparent 26%),linear-gradient(180deg,#050b16,#07172d)}
    main{min-height:100vh;display:grid;place-items:center;padding:28px}
    section{width:min(100%,560px);padding:28px;border:1px solid rgba(112,164,238,.24);border-radius:18px;background:linear-gradient(180deg,rgba(11,31,60,.94),rgba(5,13,27,.98));box-shadow:0 22px 54px rgba(0,0,0,.34)}
    .mark{display:inline-flex;align-items:center;justify-content:center;min-width:54px;height:54px;padding:0 14px;border-radius:16px;background:rgba(239,68,68,.14);border:1px solid rgba(248,113,113,.36);color:#fecaca;font-weight:950}
    h1{margin:18px 0 8px;font-size:30px;letter-spacing:-.04em}p{margin:0;color:#b9cbe1;font-size:15px;line-height:1.7;font-weight:750}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}a{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 15px;border-radius:11px;color:#eaf3ff;text-decoration:none;font-weight:950;border:1px solid rgba(88,154,255,.28);background:rgba(29,102,255,.16)}
    a.primary{color:#07172d;background:#f6b93b;border-color:#f6b93b}
  </style>
</head>
<body>
  <main>
    <section>
      <div class="mark">ERROR</div>
      <h1>데이터를 불러오지 못했습니다</h1>
      <p>일시적인 네트워크 오류이거나 외부 API 응답이 지연되는 상태일 수 있습니다. 잠시 후 다시 시도해주세요.</p>
      <div class="actions">
        <a class="primary" href="/">홈으로 돌아가기</a>
        <a href="/mobile/">모바일 홈</a>
      </div>
    </section>
  </main>
</body>
</html>
