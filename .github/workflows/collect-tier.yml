name: Collect Tier Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run collect and upload to Firebase
        run: node scripts/collect-data.js
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_ROOT: starcraftTier/current
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

          CACHE_LOCAL_JSON: "false"
          CACHE_LOCAL_ASSETS: "false"

          FETCH_TIMEOUT_MS: "15000"
          RECORD_CONCURRENCY: "3"
          RECORD_MAX_PAGES: "30"
