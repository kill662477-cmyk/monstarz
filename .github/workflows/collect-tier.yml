name: Collect Tier Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run collect
        run: node scripts/collect-data.js
        env:
          FETCH_TIMEOUT_MS: "15000"
          RECORD_CONCURRENCY: "3"
          RECORD_MAX_PAGES: "30"

      - name: Commit collected data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update tier data"
