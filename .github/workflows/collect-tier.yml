name: Collect Tier Data

on:
  workflow_dispatch:
    inputs:
      record_sync_mode:
        description: "전적 수집 모드: auto / full / incremental"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - full
          - incremental
      record_full_max_pages:
        description: "full 백필 시 Ajax 더보기 최대 페이지"
        required: true
        default: "120"
      record_incremental_max_pages:
        description: "incremental 업데이트 시 Ajax 더보기 최대 페이지"
        required: true
        default: "8"

  # GitHub 자체 예약 실행용. 외부 cron-job.org를 쓸 경우에는 GitHub API의 workflow_dispatch를 호출해야 함.
  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: read

concurrency:
  group: collect-tier-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run collect and upload to Firebase
        run: node scripts/collect-data.js
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_ROOT: starcraftTier/current
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TIER_RECORD_STORAGE_UPLOAD: "true"
          TIER_RECORD_STORAGE_REQUIRED: "true"
          TIER_RECORD_STORAGE_BUCKET: tier-records
          TIER_RECORD_STORAGE_PREFIX: records
          TIER_HEAD_TO_HEAD_SUMMARY_UPLOAD: "true"
          TIER_HEAD_TO_HEAD_SUMMARY_REQUIRED: "false"
          TIER_HEAD_TO_HEAD_SUMMARY_REBUILD_ALL: "true"
          TIER_HEAD_TO_HEAD_SUMMARY_READ_CONCURRENCY: "8"
          FIREBASE_RECORD_ROWS_UPLOAD: "false"

          CACHE_LOCAL_JSON: "false"
          CACHE_LOCAL_ASSETS: "false"

          FETCH_TIMEOUT_MS: "50000"
          RECORD_CONCURRENCY: "3"

          # 기존 값과 호환용 기본값
          RECORD_MAX_PAGES: "30"

          # 수동 실행 / 외부 cron workflow_dispatch 실행이면 입력값 사용, GitHub schedule이면 auto 사용
          RECORD_SYNC_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.record_sync_mode || 'auto' }}
          RECORD_FULL_MAX_PAGES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.record_full_max_pages || '120' }}
          RECORD_INCREMENTAL_MAX_PAGES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.record_incremental_max_pages || '8' }}
          RECORD_AJAX_DELAY_MS: "150"
          RECORD_BACKFILL_VERSION: "1"

          ELOBOARD_MAX_ROWS_PER_PLAYER: "5000"
          INACTIVE_RECORD_MONTHS: "4"
          HIDE_INACTIVE_PLAYERS: "true"
