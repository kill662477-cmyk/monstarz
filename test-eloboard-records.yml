name: Test ELOBOARD Records

on:
  workflow_dispatch:
    inputs:
      test_names:
        description: "테스트할 선수 이름/아이디, 쉼표로 구분"
        required: false
        default: "토마토,지두두,햇살"
      max_rows:
        description: "선수당 파싱할 최대 전적 수"
        required: false
        default: "30"

permissions:
  contents: read

jobs:
  test-eloboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run ELOBOARD direct parse test
        run: node scripts/test-eloboard-records.js
        env:
          TEST_NAMES: ${{ github.event.inputs.test_names }}
          MAX_ROWS_PER_PLAYER: ${{ github.event.inputs.max_rows }}
          FETCH_TIMEOUT_MS: "20000"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-eloboard-records-report
          path: data/test-eloboard-records.json
          if-no-files-found: ignore
